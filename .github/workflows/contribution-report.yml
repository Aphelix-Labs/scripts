name: Weekly Engineering Metrics

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6am UTC
  workflow_dispatch: {}  # Manual trigger

permissions:
  contents: write
  issues: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tools
        run: |
          pip install git-fame
          npm install -g jscpd

      - name: Clone all org repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p repos
          for repo in $(gh repo list Aphelix-Labs --json name -q '.[].name' --limit 100); do
            [ "$repo" = "scripts" ] && continue
            echo "Cloning $repo..."
            gh repo clone "Aphelix-Labs/$repo" "repos/$repo" 2>/dev/null || true
          done

      - name: Run engineering metrics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_DIR: repos
        run: bash code-audit.sh --base-dir repos --skip-quality

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contribution-report.md
          git diff --staged --quiet || git commit -m "chore: update weekly engineering metrics"
          git push
